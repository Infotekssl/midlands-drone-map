<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Midlands Drone Sites</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet-src.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f2; --surface: #f9f8f5; --surface2: #fbfbf9; --offset: #f3f0ec;
      --border: #d4d1ca; --divider: #dcd9d5; --text: #28251d; --muted: #7a7974;
      --primary: #01696f; --primary-bg: #cedcd8;
      --warning: #964219; --warning-bg: #ddcfc6;
      --error: #a12c7b; --success: #437a22; --success-bg: #d4dfcc; --blue: #006494;
      --shadow: 0 4px 12px rgba(0,0,0,0.08); --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
      --r: 0.5rem; --r-lg: 0.75rem; --t: 180ms cubic-bezier(0.16,1,0.3,1);
      --col-nt:   #ef7620;
      --col-sssi: #a12c7b;
      --col-aonb: #006494;
      --col-nnr:  #437a22;
      --col-mht:  #8e44ad;
      --col-raby: #7a5c1e;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); overflow: hidden; }
    body { display: flex; flex-direction: column; }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    a { color: var(--primary); }

    .hdr { display: flex; align-items: center; padding: 0.55rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 500; gap: 0.75rem; }
    .hdr-left { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; }
    .hdr-title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hdr-sub { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .hdr-logo { width: 26px; height: 26px; flex-shrink: 0; }
    .hdr-count { font-size: 11px; font-weight: 700; color: var(--primary); background: var(--primary-bg); border-radius: 9999px; padding: 0.15rem 0.5rem; white-space: nowrap; flex-shrink: 0; }

    #map { flex: 1; min-height: 0; z-index: 1; }
    .leaflet-container { background: #e8e4dc; }
    .leaflet-control-attribution { font-size: 9px !important; }

    /* site pill bar */
    .site-bar { position: absolute; top: 0.6rem; left: 0; right: 0; z-index: 400; display: flex; gap: 0.35rem; padding: 0 0.6rem; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; pointer-events: none; }
    .site-bar::-webkit-scrollbar { display: none; }
    .site-pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.32rem 0.65rem; border-radius: 9999px; font-size: 11px; font-weight: 600; white-space: nowrap; box-shadow: var(--shadow); cursor: pointer; pointer-events: all; border: 2px solid transparent; transition: all var(--t); }
    .site-pill:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,0.14); }
    .site-pill.active { border-color: rgba(255,255,255,0.7); transform: translateY(-1px); }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.75); flex-shrink: 0; }

    /* layer toggle — bottom-right above zoom */
    .layer-toggle {
      position: absolute; bottom: 120px; right: 10px;
      z-index: 400; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      box-shadow: var(--shadow); padding: 0.45rem 0.55rem;
      display: flex; flex-direction: column; gap: 0.3rem; min-width: 120px;
    }
    .layer-toggle-title { font-size: 9.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.1rem; }
    .layer-row { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    .layer-row input[type=checkbox] { width: 13px; height: 13px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
    .layer-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
    .layer-label { font-size: 10px; font-weight: 600; white-space: nowrap; }

    /* panel */
    .panel { position: absolute; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); border-radius: var(--r-lg) var(--r-lg) 0 0; box-shadow: var(--shadow-lg); z-index: 400; transition: transform var(--t); max-height: 72vh; display: flex; flex-direction: column; }
    .panel.closed { transform: translateY(calc(100% - 50px)); }
    .panel-grip { padding: 0.5rem 1rem 0; cursor: pointer; flex-shrink: 0; user-select: none; -webkit-user-select: none; }
    .panel-grip-bar { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 0.4rem; }
    .panel-tabs { display: flex; border-bottom: 1px solid var(--divider); flex-shrink: 0; padding: 0 0.75rem; gap: 0.15rem; overflow-x: auto; scrollbar-width: none; }
    .panel-tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 0.35rem 0.55rem; font-size: 11.5px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color var(--t), border-color var(--t); white-space: nowrap; }
    .tab.on { color: var(--primary); border-bottom-color: var(--primary); }
    .panel-body { overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 0.75rem 0.875rem 2rem; flex: 1; }

    /* site header */
    .site-hdr { display: flex; align-items: flex-start; gap: 0.6rem; margin-bottom: 0.75rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--divider); }
    .site-badge-big { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .site-info-name { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .site-info-sub { font-size: 11px; color: var(--muted); margin-top: 0.15rem; }
    .site-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.3rem; }
    .tag { font-size: 9.5px; font-weight: 700; padding: 0.15rem 0.4rem; border-radius: 9999px; text-transform: uppercase; letter-spacing: 0.05em; }
    .tag-nt   { background: rgba(239,118,32,0.15); color: #964219; }
    .tag-sssi { background: rgba(161,44,123,0.12); color: #a12c7b; }
    .tag-aonb { background: rgba(0,100,148,0.12);  color: #006494; }
    .tag-fe   { background: rgba(67,122,34,0.12);  color: #437a22; }
    .tag-sm   { background: rgba(150,66,25,0.12);  color: #964219; }
    .tag-re   { background: rgba(100,80,40,0.12);  color: #6b5020; }
    .tag-mht  { background: rgba(142,68,173,0.12); color: #8e44ad; }

    /* LP cards */
    .lp-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .lp-card { border-radius: var(--r); border: 1px solid var(--border); background: var(--surface2); overflow: hidden; cursor: pointer; transition: border-color var(--t); }
    .lp-card:hover, .lp-card.active { border-color: var(--primary); }
    .lp-head { display: flex; align-items: center; gap: 0.5rem; padding: 0.55rem 0.65rem; }
    .lp-dot { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9.5px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .dot-g { background: #437a22; } .dot-a { background: #964219; } .dot-r { background: #a12c7b; } .dot-b { background: #006494; }
    .lp-name { font-size: 12.5px; font-weight: 600; flex: 1; }
    .badge { font-size: 9px; font-weight: 700; padding: 0.15rem 0.38rem; border-radius: 9999px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .badge-go { background: var(--success-bg); color: var(--success); }
    .badge-caut { background: var(--warning-bg); color: var(--warning); }
    .badge-no { background: rgba(161,44,123,0.12); color: var(--error); }
    .badge-ref { background: var(--primary-bg); color: var(--primary); }
    .lp-body { padding: 0 0.65rem 0.65rem; display: none; }
    .lp-card.open .lp-body { display: block; }
    .lp-meta { display: grid; grid-template-columns: auto 1fr; gap: 0.18rem 0.45rem; font-size: 11px; margin-bottom: 0.45rem; }
    .mk { color: var(--muted); } .mv { font-weight: 500; }
    .mono { font-family: 'SF Mono','Cascadia Code','Fira Code',monospace; font-size: 10px; }
    .lp-note { font-size: 11px; color: var(--muted); line-height: 1.5; border-top: 1px solid var(--divider); padding-top: 0.4rem; }
    .lp-warn { font-size: 10.5px; color: var(--warning); line-height: 1.5; margin-top: 0.3rem; }
    .btn-maps { display: inline-flex; align-items: center; gap: 0.3rem; margin-top: 0.45rem; padding: 0.28rem 0.65rem; border-radius: var(--r); background: var(--primary-bg); color: var(--primary); font-size: 10.5px; font-weight: 600; text-decoration: none; transition: background var(--t); }
    .btn-maps:hover { background: var(--border); }

    /* overview */
    .overview-grid { display: flex; flex-direction: column; gap: 0.4rem; }
    .ov-card { border-radius: var(--r); border: 1px solid var(--border); background: var(--surface2); overflow: hidden; cursor: pointer; transition: border-color var(--t); }
    .ov-card:hover { border-color: var(--primary); }
    .ov-row { display: flex; align-items: center; gap: 0.55rem; padding: 0.6rem 0.7rem; }
    .ov-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ov-info { flex: 1; min-width: 0; }
    .ov-name { font-size: 13px; font-weight: 700; }
    .ov-meta { font-size: 10.5px; color: var(--muted); margin-top: 0.1rem; }
    .ov-arrow { color: var(--muted); font-size: 14px; }

    /* legend */
    .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; margin-bottom: 0.6rem; }
    .leg-item { display: flex; align-items: flex-start; gap: 0.4rem; padding: 0.45rem 0.55rem; background: var(--surface2); border-radius: var(--r); border: 1px solid var(--divider); }
    .leg-sw { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }
    .leg-sw.dashed { border-style: dashed !important; }
    .leg-lbl { font-size: 11px; font-weight: 600; }
    .leg-sub { font-size: 9.5px; color: var(--muted); line-height: 1.3; }

    /* rules */
    .rule-group { margin-bottom: 0.875rem; }
    .rule-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
    .rule-row { display: flex; gap: 0.4rem; align-items: flex-start; font-size: 11.5px; line-height: 1.5; margin-bottom: 0.3rem; }
    .rdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .rdot-g { background: #437a22; } .rdot-a { background: #964219; } .rdot-r { background: #a12c7b; } .rdot-b { background: #006494; }
    .disclaimer { font-size: 10.5px; color: var(--muted); line-height: 1.5; background: var(--offset); border-radius: var(--r); padding: 0.5rem 0.6rem; border: 1px solid var(--divider); margin-top: 0.5rem; }

    /* ── ADD POINT BUTTON ── */
    .btn-add-point {
      position: absolute; bottom: 190px; right: 10px; z-index: 401;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary); color: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 300; line-height: 1;
      transition: background var(--t), transform var(--t);
      border: 2.5px solid rgba(255,255,255,0.7);
    }
    .btn-add-point:hover { background: #015459; transform: scale(1.08); }
    .btn-add-point.adding { background: #964219; transform: scale(1.08); }
    .btn-add-point-label {
      position: absolute; bottom: 195px; right: 58px; z-index: 401;
      background: var(--text); color: #fff;
      font-size: 10px; font-weight: 600; white-space: nowrap;
      padding: 0.2rem 0.5rem; border-radius: var(--r);
      pointer-events: none; opacity: 0; transition: opacity var(--t);
    }
    .btn-add-point-label.vis { opacity: 1; }

    /* ── CROSSHAIR CURSOR ── */
    .map-adding { cursor: crosshair !important; }
    .map-adding .leaflet-interactive { cursor: crosshair !important; }
    .add-banner {
      position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
      z-index: 410; background: #964219; color: #fff;
      font-size: 12px; font-weight: 600; padding: 0.4rem 0.9rem;
      border-radius: 9999px; box-shadow: var(--shadow);
      white-space: nowrap; pointer-events: none;
      animation: fadeSlideDown 0.2s ease;
    }
    @keyframes fadeSlideDown { from { opacity:0; transform:translateX(-50%) translateY(-6px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

    /* ── ADD POINT FORM SHEET ── */
    .add-sheet {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 420;
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      box-shadow: var(--shadow-lg);
      transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.16,1,0.3,1);
      max-height: 82vh; display: flex; flex-direction: column;
    }
    .add-sheet.open { transform: translateY(0); }
    .add-sheet-hdr {
      display: flex; align-items: center; padding: 0.75rem 0.875rem 0;
      flex-shrink: 0;
    }
    .add-sheet-title { font-size: 14px; font-weight: 700; flex: 1; }
    .add-sheet-coords { font-size: 10.5px; color: var(--muted); font-family: monospace; margin-top: 0.15rem; }
    .add-sheet-close {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--offset); color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .add-sheet-close:hover { background: var(--border); }
    .add-sheet-body { overflow-y: auto; padding: 0.6rem 0.875rem 1.5rem; flex: 1; }
    .form-row { margin-bottom: 0.6rem; }
    .form-label { font-size: 10.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; display: block; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 0.48rem 0.6rem;
      border: 1px solid var(--border); border-radius: var(--r);
      background: var(--surface2); color: var(--text);
      font: inherit; font-size: 13px;
      transition: border-color var(--t);
      -webkit-appearance: none; appearance: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none; border-color: var(--primary);
    }
    .form-textarea { resize: vertical; min-height: 58px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.6rem; }
    .form-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .btn-save {
      flex: 1; padding: 0.6rem; border-radius: var(--r);
      background: var(--primary); color: #fff;
      font-size: 13px; font-weight: 700;
      transition: background var(--t);
    }
    .btn-save:hover { background: #015459; }
    .btn-cancel {
      padding: 0.6rem 0.9rem; border-radius: var(--r);
      background: var(--offset); color: var(--muted);
      font-size: 13px; font-weight: 600;
      border: 1px solid var(--border);
      transition: background var(--t);
    }
    .btn-cancel:hover { background: var(--border); }

    /* ── MY POINTS TAB ── */
    .my-empty { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 12.5px; line-height: 1.6; }
    .my-empty-icon { font-size: 32px; margin-bottom: 0.5rem; }
    .my-card {
      border-radius: var(--r); border: 1px solid var(--border);
      background: var(--surface2); margin-bottom: 0.4rem; overflow: hidden;
    }
    .my-card-head {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 0.65rem; cursor: pointer;
    }
    .my-card-head:hover { background: var(--offset); }
    .my-card-name { font-size: 12.5px; font-weight: 600; flex: 1; }
    .my-card-body { padding: 0 0.65rem 0.65rem; display: none; }
    .my-card.open .my-card-body { display: block; }
    .my-meta { display: grid; grid-template-columns: auto 1fr; gap: 0.18rem 0.45rem; font-size: 11px; margin-bottom: 0.5rem; }
    .my-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .btn-sm {
      font-size: 10.5px; font-weight: 600; padding: 0.25rem 0.6rem;
      border-radius: var(--r); border: 1px solid var(--border);
      background: var(--offset); color: var(--text);
      transition: background var(--t);
    }
    .btn-sm:hover { background: var(--border); }
    .btn-sm.danger { color: var(--error); border-color: rgba(161,44,123,0.3); }
    .btn-sm.danger:hover { background: rgba(161,44,123,0.1); }
    /* inline delete confirmation */
    .delete-confirm {
      display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
      background: rgba(161,44,123,0.08); border: 1px solid rgba(161,44,123,0.25);
      border-radius: var(--r); padding: 0.35rem 0.55rem; margin-top: 0.4rem;
      font-size: 11px; color: var(--error);
    }
    .delete-confirm span { flex: 1; font-weight: 600; }
    .btn-confirm-yes {
      font-size: 10.5px; font-weight: 700; padding: 0.22rem 0.6rem;
      border-radius: var(--r); background: var(--error); color: #fff;
      border: none; cursor: pointer;
    }
    .btn-confirm-yes:hover { opacity: 0.85; }
    .btn-confirm-no {
      font-size: 10.5px; font-weight: 600; padding: 0.22rem 0.55rem;
      border-radius: var(--r); background: var(--offset); color: var(--muted);
      border: 1px solid var(--border); cursor: pointer;
    }
    .btn-confirm-no:hover { background: var(--border); }
    .btn-sm.primary { background: var(--primary-bg); color: var(--primary); border-color: transparent; }
    .btn-sm.primary:hover { background: var(--border); }
    .export-box {
      margin-top: 0.5rem; background: #1e1e1e; color: #d4d4d4;
      border-radius: var(--r); padding: 0.6rem 0.7rem;
      font-size: 10px; font-family: 'SF Mono','Cascadia Code','Fira Code',monospace;
      white-space: pre-wrap; word-break: break-all; line-height: 1.5;
      border: 1px solid #333; display: none;
    }
    .export-box.vis { display: block; }

    /* ── BOUNDARY DETECTION ── */
    .bdet-status {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.45rem 0.6rem; margin: 0.5rem 0 0;
      border-radius: var(--r); border: 1px solid var(--divider);
      background: var(--offset); font-size: 11px; min-height: 36px;
    }
    .bdet-spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--primary);
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bdet-text { font-size: 11px; color: var(--muted); }
    .bdet-results {
      display: flex; flex-direction: column; gap: 0.25rem;
      margin: 0.5rem 0 0;
    }
    .bdet-tag {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 10px; font-weight: 700; padding: 0.2rem 0.5rem;
      border-radius: 9999px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .bdet-tag-row { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.35rem; }
    .bdet-none { font-size: 10.5px; color: var(--muted); margin-top: 0.4rem; font-style: italic; }
    .bdet-error { font-size: 10.5px; color: var(--warning); margin-top: 0.4rem; }
    .bdet-tag.nt   { background: rgba(239,118,32,0.15); color: #964219; }
    .bdet-tag.sssi { background: rgba(161,44,123,0.12); color: #a12c7b; }
    .bdet-tag.aonb { background: rgba(0,100,148,0.12);  color: #006494; }
    /* boundary highlight pulse on map */
    .bdet-highlight-layer { z-index: 500; }

    /* custom user-pinned markers */
    .custom-lp-icon { background: none !important; border: none !important; }

    /* popup */
    .lpopup { min-width: 170px; font-family: inherit; }
    .lpopup-site { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.2rem; }
    .lpopup-name { font-size: 13px; font-weight: 700; margin-bottom: 0.2rem; }
    .lpopup-coord { font-size: 10px; font-family: monospace; color: var(--muted); }
    .lpopup-status { font-size: 11px; font-weight: 600; margin-top: 0.3rem; }
    .s-go { color: #437a22; } .s-caut { color: #964219; } .s-no { color: #a12c7b; } .s-ref { color: #006494; }
    .leaflet-popup-content-wrapper { border-radius: 8px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important; padding: 0 !important; }
    .leaflet-popup-content { margin: 10px 12px !important; }
    .leaflet-popup-close-button { font-size: 18px !important; top: 4px !important; right: 6px !important; }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <svg class="hdr-logo" viewBox="0 0 26 26" fill="none" aria-hidden="true">

const layerGroups = { nt: L.layerGroup(), sssi: L.layerGroup(), aonb: L.layerGroup(), other: L.layerGroup() };
Object.values(layerGroups).forEach(g => g.addTo(map));

function addBoundary(group, coords, color, dash, fillOpacity, weight) {
  if (!coords || coords.length < 3) return;
  L.polygon(coords, {
    color: color, weight: weight || 2, dashArray: dash || null,
    fillColor: color, fillOpacity: fillOpacity, opacity: 0.85
  }).addTo(layerGroups[group]);
}

// Draw all boundaries
Object.entries(BOUNDARIES).forEach(([siteId, b]) => {
  // NT — orange solid
  if (b.nt)     addBoundary('nt',    b.nt,     '#ef7620', null,  0.13, 2.5);
  // SSSI — purple dashed
  if (b.sssi)   addBoundary('sssi',  b.sssi,   '#a12c7b', '8 5', 0.07, 2);
  // AONB / NL — blue thin solid
  if (b.aonb)   addBoundary('aonb',  b.aonb,   '#006494', null,  0.05, 1.5);
  // NNR — green dashed (other group)
  if (b.nnr)    addBoundary('other', b.nnr,    '#437a22', '6 4', 0.08, 2);
  // MHT — purple dashed (other group)
  if (b.mht)    addBoundary('other', b.mht,    '#8e44ad', '7 4', 0.09, 2);
  // Raby Estate — tan dashed (other group)
  if (b.raby)   addBoundary('other', b.raby,   '#7a5c1e', '5 5', 0.06, 1.5);
  // Common land — blue-grey dashed (other group)
  if (b.common) addBoundary('other', b.common, '#005080', '4 4', 0.08, 1.5);
});

function toggleLayer(name, on) {
  if (on) layerGroups[name].addTo(map);
  else    map.removeLayer(layerGroups[name]);
}

const statusColors = { go:'#437a22', caution:'#964219', no:'#a12c7b', ref:'#006494' };
const statusText   = { go:'✓ Viable TOAL', caution:'⚠ Caution — see notes', no:'✕ No launch', ref:'◎ Reference' };

function makeLPIcon(lp) {
  const c = statusColors[lp.status];
  const pulse = lp.status === 'go';
  const size = pulse ? 38 : 28;
  const inner = pulse ? 22 : 28;
  const html = pulse
    ? `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${c}22;border:2px solid ${c}55;display:flex;align-items:center;justify-content:center;animation:pulse 2s ease-in-out infinite;"><div style="width:${inner}px;height:${inner}px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;font-family:sans-serif;">${lp.label}</div></div>`
    : `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${c};border:2.5px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;font-family:sans-serif;box-shadow:0 2px 6px rgba(0,0,0,0.3);">${lp.label}</div>`;
  return L.divIcon({ html, iconSize:[size,size], iconAnchor:[size/2,size/2], className:'' });
}

function makeSiteIcon(site) {
  const size = 42;
  const html = `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${site.color};border:3px solid rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 10px rgba(0,0,0,0.35);cursor:pointer;">${site.emoji}</div>`;
  return L.divIcon({ html, iconSize:[size,size], iconAnchor:[size/2,size/2], className:'' });
}

const ks = document.createElement('style');
ks.textContent = '@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(67,122,34,0.4)}50%{box-shadow:0 0 0 8px rgba(67,122,34,0)}}';
document.head.appendChild(ks);

let activeSite = null;
let siteMarkerMap = {};
let lpMarkerMap   = {};

SITES.forEach(site => {
  const lats = site.points.map(p=>p.ll[0]), lons = site.points.map(p=>p.ll[1]);
  const cLat = lats.reduce((a,b)=>a+b,0)/lats.length, cLon = lons.reduce((a,b)=>a+b,0)/lons.length;
  const m = L.marker([cLat,cLon], { icon:makeSiteIcon(site), zIndexOffset:100 }).addTo(map);
  m.on('click', () => selectSite(site.id));
  siteMarkerMap[site.id] = m;
  lpMarkerMap[site.id] = [];
});

function showLPMarkers(site) {
  SITES.forEach(s => { lpMarkerMap[s.id].forEach(m=>map.removeLayer(m)); lpMarkerMap[s.id]=[]; });
  site.points.forEach(lp => {
    const m = L.marker(lp.ll, { icon:makeLPIcon(lp) }).addTo(map);
    m.on('click', () => {
      m.bindPopup(`<div class="lpopup"><div class="lpopup-site">${site.name}</div><div class="lpopup-name">${lp.name}</div><div class="lpopup-coord">${lp.ll[0].toFixed(5)}, ${lp.ll[1].toFixed(5)}</div><div class="lpopup-coord">${lp.os}</div><div class="lpopup-status ${lp.sc}">${statusText[lp.status]}</div></div>`,{maxWidth:240}).openPopup();
      openPanel(); renderTab('points');
      setTimeout(()=>{ const card=document.getElementById('lpc-'+lp.id); if(card){ document.querySelectorAll('.lp-card').forEach(c=>c.classList.remove('open','active')); card.classList.add('open','active'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); } },80);
    });
    lpMarkerMap[site.id].push(m);
  });
}

const siteBar = document.getElementById('siteBar');
SITES.forEach(site => {
  const pill = document.createElement('button');
  pill.className = 'site-pill'; pill.id = 'pill-'+site.id;
  pill.style.background = site.color; pill.style.color = '#fff';
  pill.innerHTML = `<span class="pill-dot"></span>${site.name}`;
  pill.addEventListener('click', () => selectSite(site.id));
  siteBar.appendChild(pill);
});

function selectSite(id) {
  const site = SITES.find(s=>s.id===id); if (!site) return;
  activeSite = id;
  document.querySelectorAll('.site-pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('pill-'+id).classList.add('active');
  map.flyTo(site.mapCenter, site.mapZoom, {duration:0.8});
  showLPMarkers(site);
  SITES.forEach(s => { if(s.id===id) map.removeLayer(siteMarkerMap[s.id]); else { if(!map.hasLayer(siteMarkerMap[s.id])) siteMarkerMap[s.id].addTo(map); } });
  openPanel(); setTabActive('points'); renderTab('points');
}

function clearSite() {
  activeSite = null;
  SITES.forEach(s => { lpMarkerMap[s.id].forEach(m=>map.removeLayer(m)); lpMarkerMap[s.id]=[]; if(!map.hasLayer(siteMarkerMap[s.id])) siteMarkerMap[s.id].addTo(map); });
  document.querySelectorAll('.site-pill').forEach(p=>p.classList.remove('active'));
  map.flyTo([52.34,-2.45], 9, {duration:0.8});
  setTabActive('overview'); renderTab('overview');
}

}

      <div class="rule-row"><span class="rdot rdot-a"></span>Best window for all sites: <strong>September–February</strong> — low sun, no nesting, dramatic light</div>
      <div class="rule-row"><span class="rdot rdot-a"></span>Scheduled Monuments (Wrekin hillfort) — overfly only, do not land on earthworks</div></div>
    <div class="rule-group"><div class="rule-title">Priority Order</div>
      <div class="rule-row"><span class="rdot rdot-g"></span>1. <strong>Long Mynd</strong> — most dramatic + OSM-verified TOAL points</div>
      <div class="rule-row"><span class="rdot rdot-g"></span>2. <strong>Titterstone Clee</strong> — easiest access, unique ruins, no confirmed ban</div>
      <div class="rule-row"><span class="rdot rdot-g"></span>3. <strong>The Wrekin</strong> — closest, road verge TOAL confirmed</div>
      <div class="rule-row"><span class="rdot rdot-g"></span>4. <strong>Stiperstones</strong> — most visually unique; longer drive</div>
      <div class="rule-row"><span class="rdot rdot-a"></span>5. <strong>Cannock Chase</strong> — easy access but permit needed first</div></div>
    <div class="disclaimer">This map is a planning aid only — not legal advice. Always verify on <a href="https://magic.defra.gov.uk" target="_blank">MAGIC</a>. Contact Natural England (ProtectedSites@naturalengland.org.uk) for formal permission queries.</div>`;
}

// ================================================================
// ADD POINT — INTERACTIVE PINNING
// ================================================================
const LS_KEY = 'midlands_custom_points';
let addMode = false;
let pendingLatLng = null;
let customPoints = [];
let customMarkers = [];

function loadCustomPoints() {
  try { customPoints = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch(e) { customPoints = []; }
}
function saveCustomPoints() {
  localStorage.setItem(LS_KEY, JSON.stringify(customPoints));
}
loadCustomPoints();

const statusDotClass = { go:'dot-g', caution:'dot-a', no:'dot-r', ref:'dot-b' };
const statusBadgeClass = { go:'badge-go', caution:'badge-caut', no:'badge-no', ref:'badge-ref' };
const statusScClass = { go:'s-go', caution:'s-caut', no:'s-no', ref:'s-ref' };
const statusLabelMap = { go:'TOAL', caution:'Caution', no:'No Launch', ref:'Ref' };

function makeCustomIcon(pt) {
  const c = statusColors[pt.status] || '#437a22';
  const html = `<div style="width:32px;height:32px;border-radius:50%;background:${c};border:2.5px solid rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;font-family:system-ui,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.4);box-sizing:border-box;">${pt.label}</div>`;
  return L.divIcon({ html, iconSize:[32,32], iconAnchor:[16,16], popupAnchor:[0,-16], className:'custom-lp-icon' });
}

function renderCustomMarkers() {
  customMarkers.forEach(m => map.removeLayer(m));
  customMarkers = [];
  customPoints.forEach(pt => {
    const m = L.marker([pt.lat, pt.lon], {
      icon: makeCustomIcon(pt),
      pane: 'customMarkerPane',
      zIndexOffset: 500
    }).addTo(map);
    m.on('click', () => {
      m.bindPopup(`<div class="lpopup">
        <div class="lpopup-site" style="color:#6b3fa0">My Points</div>
        <div class="lpopup-name">${pt.name}</div>
        <div class="lpopup-coord">${pt.lat.toFixed(5)}, ${pt.lon.toFixed(5)}</div>
        <div class="lpopup-status ${statusScClass[pt.status]}">${statusText[pt.status]}</div>
      </div>`, {maxWidth:240}).openPopup();
      openPanel(); setTabActive('mypoints'); renderTab('mypoints');
    });
    customMarkers.push(m);
  });
}
renderCustomMarkers();

function toggleAddMode() {
  addMode = !addMode;
  const btn = document.getElementById('btnAddPoint');
  const lbl = document.getElementById('addPointLabel');
  const mapEl = document.getElementById('map');
  if (addMode) {
    btn.classList.add('adding');
    btn.title = 'Cancel — tap map to pin';
    btn.textContent = '✕';
    lbl.classList.add('vis');
    mapEl.classList.add('map-adding');
    showAddBanner();
    closePanel();
  } else {
    cancelAddMode();
  }
}

function cancelAddMode() {
  addMode = false;
  const btn = document.getElementById('btnAddPoint');
  const lbl = document.getElementById('addPointLabel');
  const mapEl = document.getElementById('map');
  btn.classList.remove('adding');
  btn.title = 'Add a launch point';
  btn.textContent = '+';
  lbl.classList.remove('vis');
  mapEl.classList.remove('map-adding');
  removeAddBanner();
}

let bannerEl = null;
function showAddBanner() {
  removeAddBanner();
  bannerEl = document.createElement('div');
  bannerEl.className = 'add-banner';
  bannerEl.textContent = 'Tap anywhere on the map to pin a point';
  document.getElementById('map-wrap').appendChild(bannerEl);
}
function removeAddBanner() {
  if (bannerEl) { bannerEl.remove(); bannerEl = null; }
}

map.on('click', function(e) {
  if (!addMode) return;
  // Ignore map clicks while the form sheet is open
  if (document.getElementById('addSheet').classList.contains('open')) return;
  pendingLatLng = e.latlng;
  cancelAddMode();
  openAddSheet(pendingLatLng);
});

function openAddSheet(latlng) {
  document.getElementById('sheetCoords').textContent =
    latlng.lat.toFixed(5) + ', ' + latlng.lng.toFixed(5);
  document.getElementById('fName').value = '';
  document.getElementById('fLabel').value = 'LP1';
  document.getElementById('fStatus').value = 'go';
  document.getElementById('fSurf').value = '';
  document.getElementById('fLand').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('fWarn').value = '';
  // Store coords in hidden fields — JS variable can be lost before save fires
  document.getElementById('fLat').value = latlng.lat;
  document.getElementById('fLon').value = latlng.lng;
  document.getElementById('addSheet').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 300);
}

function closeAddSheet() {
  document.getElementById('addSheet').classList.remove('open');
  pendingLatLng = null;
}

function savePoint() {
  // Read coordinates from hidden inputs — immune to JS variable timing issues
  const lat = parseFloat(document.getElementById('fLat').value);
  const lon = parseFloat(document.getElementById('fLon').value);
  if (isNaN(lat) || isNaN(lon)) {
    const sd = document.getElementById('sheetCoords');
    if (sd) sd.textContent = '⚠ Location lost — close form, tap + and pin again.';
    return;
  }
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); document.getElementById('fName').style.borderColor='#a12c7b'; return; }
  document.getElementById('fName').style.borderColor = '';

  const pt = {
    id:     'cust_' + Date.now(),
    name,
    label:  document.getElementById('fLabel').value,
    status: document.getElementById('fStatus').value,
    surf:   document.getElementById('fSurf').value.trim() || 'Not specified',
    land:   document.getElementById('fLand').value.trim() || 'Not specified',
    notes:  document.getElementById('fNotes').value.trim(),
    warn:   document.getElementById('fWarn').value.trim(),
    lat:    lat,
    lon:    lon,
    saved:  new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}),
    boundaries: null
  };

  // Save immediately — boundary fetch is blocked in the iframe sandbox
  // MAGIC map button in the card lets user check designations externally
  pt.boundaries = null;
  customPoints.unshift(pt);
  saveCustomPoints();

  closeAddSheet();
  renderCustomMarkers();
  openPanel();
  setTabActive('mypoints');
  renderTab('mypoints');
  setTimeout(() => {
    toggleMyCard(pt.id);
    map.panTo([pt.lat, pt.lon]);
  }, 150);
}

// ================================================================
// BOUNDARY DETECTION
// ================================================================
const BDET_APIS = [
  {
    key:  'sssi',
    url:  'https://services.arcgis.com/JJzESW51TqeY9uat/arcgis/rest/services/SSSI_England/FeatureServer/0/query',
    name: 'NAME',
    label: 'SSSI'
  },
  {
    key:  'aonb',
    url:  'https://services.arcgis.com/JJzESW51TqeY9uat/arcgis/rest/services/Areas_of_Outstanding_Natural_Beauty_England/FeatureServer/0/query',
    name: 'NAME',
    label: 'AONB'
  },
  {
    key:  'nt',
    url:  'https://services-eu1.arcgis.com/NPIbx47lsIiu2pqz/arcgis/rest/services/National_Trust_Open_Data_Land_Always_Open/FeatureServer/0/query',
    name: 'Name',
    label: 'NT'
  }
];

// Layer group for live-fetched custom boundaries (separate from baked-in ones)
const customBoundaryLayer = L.layerGroup().addTo(map);
const customBoundaryStore = {};  // id -> array of L.polygon

function buildQueryUrl(apiUrl, lon, lat) {
  const p = new URLSearchParams({
    where: '1=1',
    geometry: `${lon},${lat}`,
    geometryType: 'esriGeometryPoint',
    inSR: '4326',
    spatialRel: 'esriSpatialRelIntersects',
    outFields: '*',
    returnGeometry: 'true',
    outSR: '4326',
    f: 'geojson'
  });
  return `${apiUrl}?${p.toString()}`;
}

// Timeout using Promise.race — guaranteed to resolve even in sandboxed iframes
// where AbortController.abort() may be silently ignored
function timedFetch(url, ms) {
  const timeout = new Promise(resolve => setTimeout(() => resolve(null), ms));
  const req = fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);
  return Promise.race([req, timeout]);
}

async function detectBoundaries(lat, lon) {
  const results = { sssi:[], aonb:[], nt:[] };

  // Hard overall cap: if ALL three APIs haven't responded in 9s, return empty
  const overallTimeout = new Promise(resolve => setTimeout(resolve, 9000));

  const work = Promise.allSettled(
    BDET_APIS.map(api =>
      timedFetch(buildQueryUrl(api.url, lon, lat), 7000)
        .then(gj => {
          if (gj && gj.features && gj.features.length > 0) {
            results[api.key] = gj.features.map(f => ({
              name: f.properties[api.name] || api.label,
              geometry: f.geometry
            }));
          }
        })
        .catch(() => {})
    )
  );

  await Promise.race([work, overallTimeout]);
  return results;
}

const bdColors = {
  nt:   { color:'#ef7620', fill:0.13, dash: null,  weight:2.5 },
  sssi: { color:'#a12c7b', fill:0.07, dash:'8 5',  weight:2   },
  aonb: { color:'#006494', fill:0.05, dash: null,  weight:1.5 }
};

function geojsonCoordsToLatLng(geometry) {
  // Returns array of arrays of [lat,lon] rings suitable for L.polygon
  if (!geometry) return [];
  const toRing = ring => ring.map(c => [c[1], c[0]]);
  if (geometry.type === 'Polygon') {
    return geometry.coordinates.map(toRing);
  } else if (geometry.type === 'MultiPolygon') {
    // Flatten multipolygon into separate polygon calls
    return geometry.coordinates.map(poly => poly.map(toRing));
  }
  return [];
}

function drawCustomBoundaries(pt) {
  if (!pt.boundaries) return;
  const polys = [];
  ['nt','sssi','aonb'].forEach(key => {
    const feats = pt.boundaries[key] || [];
    const s = bdColors[key];
    feats.forEach(feat => {
      const rings = geojsonCoordsToLatLng(feat.geometry);
      if (!rings.length) return;
      const addPoly = (r) => {
        const poly = L.polygon(r, {
          color: s.color, weight: s.weight, dashArray: s.dash,
          fillColor: s.color, fillOpacity: s.fill, opacity: 0.9,
          pane: 'customBoundaryPane'
        }).addTo(customBoundaryLayer);
        poly.bindPopup(
          `<div class="lpopup"><div class="lpopup-site">${key.toUpperCase()}</div><div class="lpopup-name">${feat.name}</div></div>`,
          { maxWidth: 220 }
        );
        polys.push(poly);
      };
      if (feat.geometry.type === 'MultiPolygon') {
        rings.forEach(r => addPoly(r));
      } else {
        addPoly(rings);
      }
    });
  });
  customBoundaryStore[pt.id] = polys;
}

function showBoundariesForPoint(ptId) {
  // Clear all custom boundary highlights, redraw just this point's
  customBoundaryLayer.clearLayers();
  customBoundaryStore[ptId] = customBoundaryStore[ptId] || [];
  const pt = customPoints.find(p => p.id === ptId);
  if (pt && pt.boundaries) drawCustomBoundaries(pt);
}

function clearCustomBoundaries() {
  customBoundaryLayer.clearLayers();
}

function buildLandString(boundaries, fallback) {
  if (!boundaries || boundaries.error) return fallback;
  const parts = [];
  if (boundaries.nt   && boundaries.nt.length)   parts.push('NT');
  if (boundaries.sssi && boundaries.sssi.length) parts.push('SSSI');
  if (boundaries.aonb && boundaries.aonb.length) parts.push('AONB');
  if (!parts.length) return fallback;
  return parts.join(' + ') + ' — ' + (fallback !== 'Not specified' ? fallback : 'see detected boundaries');
}

// ================================================================
// MY POINTS TAB RENDERER
// ================================================================
function renderBoundaryTags(pt) {
  const b = pt.boundaries;
  if (!b) return '';
  if (b.error) return `<div class="bdet-error">⚠ Boundary check timed out — tap Recheck to retry</div>`;
  const tags = [];
  if (b.nt   && b.nt.length)   b.nt.forEach(f   => tags.push(`<span class="bdet-tag nt">NT · ${f.name}</span>`));
  if (b.sssi && b.sssi.length) b.sssi.forEach(f => tags.push(`<span class="bdet-tag sssi">SSSI · ${f.name}</span>`));
  if (b.aonb && b.aonb.length) b.aonb.forEach(f => tags.push(`<span class="bdet-tag aonb">AONB · ${f.name}</span>`));
  if (!tags.length) return `<div class="bdet-none">No NT, SSSI or AONB detected at this point</div>`;
  return `<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:0.5rem;margin-bottom:0.25rem;">Detected designations</div><div class="bdet-tag-row">${tags.join('')}</div>`;
}

function renderMyPoints(el) {
  if (customPoints.length === 0) {
    el.innerHTML = `
      <div class="my-empty">
        <div class="my-empty-icon">📍</div>
        <strong>No saved points yet</strong><br>
        Tap the <strong style="color:var(--primary)">+</strong> button on the map,
        then tap any location to pin a new launch point.
        Points are saved to this device.
      </div>`;
    return;
  }
  el.innerHTML = `
    <div style="font-size:10.5px;color:var(--muted);margin-bottom:0.6rem;">Saved to this device · ${customPoints.length} point${customPoints.length!==1?'s':''}</div>`
    + customPoints.map((pt,i) => {
      const dc = statusDotClass[pt.status];
      const bc = statusBadgeClass[pt.status];
      const hasBoundaries = pt.boundaries && !pt.boundaries.error &&
        (['nt','sssi','aonb'].some(k => pt.boundaries[k] && pt.boundaries[k].length));
      return `<div class="my-card" id="myc-${pt.id}">
        <div class="my-card-head" onclick="toggleMyCard('${pt.id}')">
          <div class="lp-dot ${dc}" style="width:26px;height:26px;font-size:9px;">${pt.label}</div>
          <div class="my-card-name">${pt.name}</div>
          <span class="badge ${bc}">${statusLabelMap[pt.status]}</span>
        </div>
        <div class="my-card-body">
          <div class="my-meta">
            <span class="mk">Coords</span><span class="mv mono">${pt.lat.toFixed(5)}, ${pt.lon.toFixed(5)}</span>
            <span class="mk">Surface</span><span class="mv">${pt.surf}</span>
            <span class="mk">Land</span><span class="mv">${pt.land}</span>
            <span class="mk">Added</span><span class="mv">${pt.saved}</span>
          </div>
          ${renderBoundaryTags(pt)}
          ${pt.notes ? `<div class="lp-note" style="margin-bottom:0.4rem;margin-top:0.4rem;">${pt.notes}</div>` : ''}
          ${pt.warn  ? `<div class="lp-warn">⚠ ${pt.warn}</div>` : ''}
          <div class="my-actions" style="margin-top:0.5rem;">
            <button class="btn-sm primary" onclick="flyToCustom(${pt.lat},${pt.lon})">📍 Fly to</button>
            ${hasBoundaries ? `<button class="btn-sm" onclick="showBoundariesForPoint('${pt.id}')">Show bounds</button>` : ''}
            <a class="btn-sm" href="https://magic.defra.gov.uk/MagicMap.aspx?startTopic=Designations&activeLayers=sssiIndex,aonbIndex&query=POINT(${pt.lon}%20${pt.lat})" target="_blank" rel="noopener">MAGIC map</a>
            <a class="btn-sm" href="https://maps.google.com/?q=${pt.lat},${pt.lon}" target="_blank" rel="noopener">Google Maps</a>
            <button class="btn-sm" onclick="toggleExport('${pt.id}')">Export</button>
            <button class="btn-sm danger" id="delbtn-${pt.id}" onclick="confirmDelete('${pt.id}')">✕ Delete</button>
          </div>
          <div class="export-box" id="exp-${pt.id}">${buildExport(pt)}</div>
        </div>
      </div>`;
    }).join('');
}

async function recheckBoundaries(id) {
  const pt = customPoints.find(p => p.id === id);
  if (!pt) return;
  const card = document.getElementById('myc-' + id);
  if (card) {
    const actionsEl = card.querySelector('.my-actions');
    if (actionsEl) actionsEl.innerHTML = `<div class="bdet-status"><div class="bdet-spinner"></div><span class="bdet-text">Checking boundaries…</span></div>`;
  }
  try {
    const result = await detectBoundaries(pt.lat, pt.lon);
    pt.boundaries = result;
    pt.land = buildLandString(result, pt.land);
    saveCustomPoints();
    drawCustomBoundaries(pt);
  } catch(e) {
    pt.boundaries = { error: true };
    saveCustomPoints();
  }
  renderMyPoints(document.getElementById('pbody'));
  setTimeout(() => toggleMyCard(id), 50);
}

function toggleMyCard(id) {
  const card = document.getElementById('myc-' + id);
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.my-card').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

function flyToCustom(lat, lon) {
  map.flyTo([lat, lon], 15, {duration: 0.8});
}

function confirmDelete(id) {
  // Remove any existing confirm rows first
  document.querySelectorAll('.delete-confirm').forEach(el => el.remove());
  const btn = document.getElementById('delbtn-' + id);
  if (!btn) return;
  const row = document.createElement('div');
  row.className = 'delete-confirm';
  row.id = 'delconfirm-' + id;
  row.innerHTML = `<span>Delete this point?</span>
    <button class="btn-confirm-no" onclick="cancelDelete('${id}')">Cancel</button>
    <button class="btn-confirm-yes" onclick="deletePoint('${id}')">Yes, delete</button>`;
  btn.parentElement.insertAdjacentElement('afterend', row);
  // Auto-cancel after 6 seconds
  setTimeout(() => cancelDelete(id), 6000);
}

function cancelDelete(id) {
  const row = document.getElementById('delconfirm-' + id);
  if (row) row.remove();
}

function deletePoint(id) {
  customPoints = customPoints.filter(p => p.id !== id);
  saveCustomPoints();
  renderCustomMarkers();
  // Remove stored boundary polygons for this point
  if (customBoundaryStore[id]) {
    customBoundaryStore[id].forEach(p => customBoundaryLayer.removeLayer(p));
    delete customBoundaryStore[id];
  }
  renderMyPoints(document.getElementById('pbody'));
}

function toggleExport(id) {
  const box = document.getElementById('exp-' + id);
  const vis = box.classList.toggle('vis');
  if (vis) {
    // Select all text for easy copy
    const range = document.createRange();
    range.selectNodeContents(box);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function buildExport(pt) {
  const statusMap = { go:'go', caution:'caution', no:'no', ref:'ref' };
  const dotMap    = { go:'dot-g', caution:'dot-a', no:'dot-r', ref:'dot-b' };
  const badgeMap  = { go:'badge-go', caution:'badge-caut', no:'badge-no', ref:'badge-ref' };
  const scMap     = { go:'s-go', caution:'s-caut', no:'s-no', ref:'s-ref' };
  return `{id:'${pt.id}',label:'${pt.label}',name:'${pt.name}',
 ll:[${pt.lat.toFixed(5)},${pt.lon.toFixed(5)}],
 status:'${pt.status}',
 dot:'${dotMap[pt.status]}',bs:'${badgeMap[pt.status]}',sc:'${scMap[pt.status]}',
 os:'',alt:'',surf:'${pt.surf}',
 land:'${pt.land}',
 desc:'${pt.notes.replace(/'/g,"\\'") }',
 warn:'${pt.warn.replace(/'/g,"\\'") }'}`;
}

// ================================================================
// INIT
// ================================================================
// Block Leaflet from treating any UI overlay as a map interaction.
// Done ONCE here rather than on every openAddSheet call.
(function blockLeafletOnOverlays() {
  // For panel, layerToggle, siteBar — full click propagation block is fine
  ['panel','layerToggle','siteBar'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      L.DomEvent.disableClickPropagation(el);
      L.DomEvent.disableScrollPropagation(el);
    }
  });
  // For addSheet: only block scroll propagation + stop map-click via mousedown on the sheet body.
  // Do NOT use disableClickPropagation on addSheet — it swallows button onclick events.
  const sheet = document.getElementById('addSheet');
  if (sheet) {
    L.DomEvent.disableScrollPropagation(sheet);
    L.DomEvent.on(sheet, 'mousedown touchstart', L.DomEvent.stopPropagation);
  }
})();

setTimeout(()=>{ openPanel(); renderTab('overview'); }, 400);
setTimeout(()=>{ map.invalidateSize(); }, 500);

// Save/Cancel wired via onclick attributes above
