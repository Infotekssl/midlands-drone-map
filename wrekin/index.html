<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>The Wrekin — Drone Launch Points</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f8fa;--surface:#fff;--border:#e2e5ea;--divider:#f0f1f4;
    --text:#1a1d23;--muted:#6b7280;--accent:#1b6b77;--accent2:#2e8b98;
    --nt:#ef7620;--sssi:#a12c7b;--fe:#2d7a2d;--toal:#437a22;
    --shadow:0 1px 4px rgba(0,0,0,.10);--shadow-lg:0 4px 24px rgba(0,0,0,.13);
    --r:10px;--r-lg:16px;--t:0.18s ease;
  }
  html,body{height:100%;background:var(--bg);font-family:system-ui,-apple-system,sans-serif;color:var(--text);font-size:14px}
  #map-wrap{position:relative;width:100%;height:100vh;overflow:hidden}
  #map{width:100%;height:100%}

  /* Site bar */
  .site-bar{position:absolute;top:.5rem;left:0;right:0;z-index:400;display:flex;gap:.3rem;padding:0 .6rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;pointer-events:none}
  .site-bar::-webkit-scrollbar{display:none}
  .site-pill{display:inline-flex;align-items:center;gap:.25rem;padding:.28rem .6rem;border-radius:9999px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:var(--shadow);cursor:pointer;pointer-events:all;border:2px solid transparent;transition:all var(--t);background:var(--surface);color:var(--text)}
  .site-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* Panel */
  .panel{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:var(--r-lg) var(--r-lg) 0 0;box-shadow:var(--shadow-lg);z-index:400;transition:transform var(--t);max-height:75vh;display:flex;flex-direction:column}
  .panel.closed{transform:translateY(calc(100% - 48px))}
  .panel-grip{padding:.5rem 1rem 0;cursor:pointer;flex-shrink:0;user-select:none;-webkit-user-select:none}
  .panel-grip-bar{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto .35rem}
  .panel-tabs{display:flex;border-bottom:1px solid var(--divider);flex-shrink:0;padding:0 .75rem;gap:.15rem;overflow-x:auto;scrollbar-width:none}
  .panel-tabs::-webkit-scrollbar{display:none}
  .tab{padding:.45rem .75rem;font-size:12px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all var(--t)}
  .tab.on{color:var(--accent);border-bottom-color:var(--accent)}
  .panel-body{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:.75rem .875rem 2rem;flex:1}

  /* Layer toggle */
  .layer-toggle{position:absolute;bottom:3.5rem;right:.75rem;z-index:401;background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:.55rem .7rem;min-width:140px}
  .layer-toggle-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem}
  .layer-row{display:flex;align-items:center;gap:.4rem;font-size:12px;font-weight:500;cursor:pointer;padding:.18rem 0}
  .layer-row input{accent-color:var(--accent);width:14px;height:14px}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .dot-fe{background:var(--fe)}
  .dot-sssi{background:var(--sssi)}
  .dot-toal{background:var(--toal)}

  /* Cards */
  .section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:.9rem 0 .4rem}
  .lp-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:.55rem;overflow:hidden;cursor:pointer;transition:box-shadow var(--t)}
  .lp-card:hover{box-shadow:var(--shadow)}
  .lp-card-hdr{display:flex;align-items:center;gap:.5rem;padding:.5rem .65rem}
  .lp-badge{font-size:9px;font-weight:800;padding:.2rem .45rem;border-radius:4px;background:var(--accent);color:#fff;flex-shrink:0}
  .lp-name{font-size:13px;font-weight:600;flex:1}
  .lp-status{font-size:10px;font-weight:700;padding:.18rem .45rem;border-radius:4px}
  .s-go{background:#d1fae5;color:#065f46}
  .s-caut{background:#fef3c7;color:#92400e}
  .s-no{background:#fee2e2;color:#991b1b}
  .lp-body{padding:.4rem .65rem .65rem;border-top:1px solid var(--divider);display:none;font-size:12px;line-height:1.55}
  .lp-body.open{display:block}
  .lp-row{display:flex;gap:.4rem;margin-bottom:.2rem}
  .lp-lbl{color:var(--muted);width:72px;flex-shrink:0}
  .lp-val{font-weight:500;flex:1}
  .lp-warn{background:#fff7ed;border-left:3px solid #f59e0b;padding:.35rem .5rem;border-radius:0 4px 4px 0;font-size:11.5px;margin-top:.35rem;color:#78350f}
  .lp-actions{display:flex;gap:.4rem;margin-top:.5rem;flex-wrap:wrap}
  .btn-sm{font-size:11px;font-weight:600;padding:.25rem .6rem;border-radius:6px;border:none;cursor:pointer;transition:background var(--t)}
  .btn-fly{background:var(--accent);color:#fff}
  .btn-fly:hover{background:var(--accent2)}
  .btn-gmap{background:#e8f5e9;color:#1b5e20}

  /* Legend */
  .legend-row{display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.55rem;font-size:12.5px}
  .legend-swatch{width:22px;height:14px;border-radius:3px;flex-shrink:0;margin-top:2px}
  .sw-fe{background:rgba(45,122,45,.25);border:2px solid #2d7a2d}
  .sw-sssi{background:rgba(161,44,123,.1);border:2px dashed #a12c7b}
  .sw-nt{background:rgba(239,118,32,.13);border:2px solid #ef7620}
  .sw-toal{background:#437a22}
  .sw-caution{background:#f59e0b}
  .legend-text{}
  .legend-text strong{display:block;margin-bottom:.1rem}

  /* Rules */
  .rules-block{background:#f0f7ff;border-left:3px solid var(--accent);padding:.5rem .7rem;border-radius:0 var(--r) var(--r) 0;margin-bottom:.6rem;font-size:12.5px;line-height:1.6}
  .rules-block strong{display:block;margin-bottom:.2rem;font-size:13px}

  /* Add point button */
  .btn-add-point{position:absolute;bottom:4.2rem;right:.75rem;z-index:402;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;font-weight:300;border:none;cursor:pointer;box-shadow:var(--shadow-lg);display:flex;align-items:center;justify-content:center;transition:background var(--t);line-height:1}
  .btn-add-point:hover,.btn-add-point.adding{background:#c0392b}
  .add-label{position:absolute;bottom:4.35rem;right:3.6rem;z-index:402;background:rgba(0,0,0,.72);color:#fff;font-size:11px;padding:.2rem .45rem;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity var(--t)}
  .add-label.vis{opacity:1}
  .map-adding{cursor:crosshair !important}
  .map-adding .leaflet-interactive{cursor:crosshair !important}
  .add-banner{position:absolute;top:2.8rem;left:50%;transform:translateX(-50%);z-index:410;background:rgba(27,107,119,.92);color:#fff;padding:.4rem .9rem;border-radius:20px;font-size:12px;font-weight:600;pointer-events:none;white-space:nowrap}

  /* Add sheet */
  .add-sheet{position:absolute;bottom:0;left:0;right:0;z-index:420;background:var(--surface);border-top:1px solid var(--border);border-radius:var(--r-lg) var(--r-lg) 0 0;box-shadow:var(--shadow-lg);transform:translateY(100%);transition:transform .28s cubic-bezier(.16,1,.3,1);max-height:82vh;display:flex;flex-direction:column}
  .add-sheet.open{transform:translateY(0)}
  .add-sheet-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:.7rem .875rem .3rem;flex-shrink:0}
  .add-sheet-title{font-size:14px;font-weight:700;flex:1}
  .add-sheet-coords{font-size:10.5px;color:var(--muted);font-family:monospace;margin-top:.15rem}
  .add-sheet-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--divider);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
  .form-actions{padding:.4rem .875rem 0;flex-shrink:0;display:flex;gap:.5rem}
  .btn-save{flex:1;padding:.55rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
  .btn-cancel{padding:.55rem 1rem;background:var(--divider);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
  .add-sheet-body{overflow-y:auto;padding:.6rem .875rem 1.5rem;flex:1}
  .form-row{margin-bottom:.65rem}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.65rem}
  .form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:.25rem}
  .form-input,.form-select,.form-textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:.45rem .55rem;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color var(--t)}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
  .form-textarea{resize:none;height:56px}

  /* My points */
  .myp-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:.55rem;overflow:hidden}
  .myp-hdr{display:flex;align-items:center;gap:.4rem;padding:.5rem .65rem;cursor:pointer}
  .myp-name{font-size:13px;font-weight:600;flex:1}
  .myp-body{padding:.4rem .65rem .65rem;border-top:1px solid var(--divider);display:none;font-size:12px;line-height:1.55}
  .myp-body.open{display:block}
  .del-confirm{display:none;background:#fee2e2;border-radius:7px;padding:.4rem .55rem;margin-top:.35rem;font-size:12px}
  .del-confirm.show{display:flex;align-items:center;gap:.4rem}
  .btn-del-confirm{background:#dc2626;color:#fff;border:none;border-radius:5px;padding:.2rem .5rem;font-size:11px;font-weight:700;cursor:pointer}
  .btn-del-cancel{background:var(--border);border:none;border-radius:5px;padding:.2rem .5rem;font-size:11px;font-weight:600;cursor:pointer}

  /* Popup */
  .lpopup{font-family:system-ui,sans-serif;min-width:160px}
  .lpopup-site{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
  .lpopup-name{font-size:14px;font-weight:700;margin-bottom:.2rem}
  .lpopup-coord{font-size:10.5px;color:var(--muted);font-family:monospace;margin-bottom:.3rem}
  .lpopup-status{font-size:11px;font-weight:700;padding:.2rem .45rem;border-radius:4px;display:inline-block}
</style>
</head>
<body>
<div id="map-wrap">
  <div id="map"></div>
  <div class="site-bar">
    <button class="site-pill active" onclick="flyTo(52.6640,-2.5497,14)">The Wrekin</button>
    <button class="site-pill" onclick="flyTo(52.6692,-2.5514,15)">Summit</button>
    <button class="site-pill" onclick="flyTo(52.6640,-2.5497,13)">Overview</button>
  </div>
  <button class="btn-add-point" id="btnAddPoint" title="Add a launch point" onclick="toggleAddMode()">+</button>
  <div class="add-label" id="addPointLabel">Tap map to pin</div>

  <!-- Add Point Form Sheet -->
  <div class="add-sheet" id="addSheet">
    <div class="add-sheet-hdr">
      <div>
        <div class="add-sheet-title">New Launch Point</div>
        <div class="add-sheet-coords" id="sheetCoords"></div>
      </div>
      <button class="add-sheet-close" onclick="closeAddSheet()">✕</button>
    </div>
    <div class="form-actions">
      <button type="button" class="btn-cancel" id="btnCancel" onclick="closeAddSheet()">Cancel</button>
      <button type="button" class="btn-save" id="btnSave" onclick="savePoint()">Save Point</button>
    </div>
    <input type="hidden" id="fLat" value="">
    <input type="hidden" id="fLon" value="">
    <div class="add-sheet-body">
      <div class="form-row">
        <label class="form-label" for="fName">Point Name <span style="color:#a12c7b">*</span></label>
        <input class="form-input" id="fName" type="text" placeholder="e.g. Forest Glen Road Verge" autocomplete="off"/>
      </div>
      <div class="form-row-2">
        <div>
          <label class="form-label" for="fLabel">Label</label>
          <select class="form-select" id="fLabel">
            <option value="LP1">LP1</option><option value="LP2">LP2</option>
            <option value="LP3">LP3</option><option value="REF">REF</option>
            <option value="CAR">CAR</option>
          </select>
        </div>
        <div>
          <label class="form-label" for="fStatus">Status</label>
          <select class="form-select" id="fStatus">
            <option value="go">TOAL ✓</option>
            <option value="caution">Caution</option>
            <option value="no">No-Launch</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label" for="fNotes">Notes</label>
        <textarea class="form-textarea" id="fNotes" placeholder="Surface, access, landmarks…"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label" for="fWarn">Warning</label>
        <textarea class="form-textarea" id="fWarn" placeholder="Restrictions, hazards…"></textarea>
      </div>
    </div>
  </div>

  <!-- Panel -->
  <div class="panel closed" id="panel">
    <div class="panel-grip" id="grip"><div class="panel-grip-bar"></div></div>
    <div class="panel-tabs" id="tabs">
      <button class="tab on" data-t="info">Info</button>
      <button class="tab" data-t="launch">Launch Points</button>
      <button class="tab" data-t="mypoints">My Points</button>
      <button class="tab" data-t="legend">Legend</button>
      <button class="tab" data-t="rules">Rules</button>
    </div>
    <div class="panel-body" id="pbody"></div>
  </div>

  <!-- Layer toggle -->
  <div class="layer-toggle" id="layerToggle">
    <div class="layer-toggle-title">Boundaries</div>
    <label class="layer-row"><input type="checkbox" id="togFE" checked><span class="dot dot-fe"></span>Forestry England</label>
    <label class="layer-row"><input type="checkbox" id="togSSSI" checked><span class="dot dot-sssi"></span>SSSI</label>
    <label class="layer-row"><input type="checkbox" id="togTOAL" checked><span class="dot dot-toal"></span>TOAL Zones</label>
  </div>
</div>

<script>

const statusSc     = { go:'s-go', caution:'s-caut', no:'s-no', ref:'s-ref' };

// ── Map init ──
const map = L.map('map', { center:[SITE.lat, SITE.lon], zoom:SITE.zoom, zoomControl:false });
map.createPane('boundaryPane'); map.getPane('boundaryPane').style.zIndex = 450;
map.createPane('markerPane');   map.getPane('markerPane').style.zIndex   = 460;

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd', maxZoom:19,
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>'
}).addTo(map);

L.control.zoom({ position:'topright' }).addTo(map);

// ── Boundaries ──
const feLayer   = L.layerGroup().addTo(map);
const sssiLayer = L.layerGroup().addTo(map);
const toalLayer = L.layerGroup().addTo(map);

// Forestry England forest block
WREKIN_FOREST.forEach(poly => {
  L.polygon(poly, {
    pane:'boundaryPane',
    color:'#2d7a2d', weight:1.5, fillColor:'#2d7a2d', fillOpacity:0.18, dashArray:null
  }).addTo(feLayer);
});

// SSSI boundary
WREKIN_SSSI.forEach(ring => {
  L.polygon(ring, {
    pane:'boundaryPane',
    color:'#a12c7b', weight:2.5, fillColor:'#a12c7b', fillOpacity:0.08, dashArray:'8 5'
  }).bindTooltip('The Wrekin & The Ercall SSSI', {sticky:true, className:'sssi-tip'}).addTo(sssiLayer);
});

// TOAL zones
const TOAL_ZONES = [
  { latlng:[52.6640,-2.5497], r:120, label:'LP1 TOAL Zone' },
  { latlng:[52.6608,-2.5620], r:100, label:'LP2 TOAL Zone' },
];
TOAL_ZONES.forEach(z => {
  L.circle(z.latlng, { radius:z.r, pane:'boundaryPane',
    color:'#437a22', weight:2, fillColor:'#437a22', fillOpacity:0.12
  }).bindTooltip(z.label).addTo(toalLayer);
});

// Layer toggles
document.getElementById('togFE').addEventListener('change', e => e.target.checked ? map.addLayer(feLayer) : map.removeLayer(feLayer));
document.getElementById('togSSSI').addEventListener('change', e => e.target.checked ? map.addLayer(sssiLayer) : map.removeLayer(sssiLayer));
document.getElementById('togTOAL').addEventListener('change', e => e.target.checked ? map.addLayer(toalLayer) : map.removeLayer(toalLayer));

// ── Site markers ──
function makeLPIcon(lp) {
  const c = statusColors[lp.status];
  const html = `<div style="width:30px;height:30px;border-radius:50%;background:${c};border:2.5px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;color:#fff;font-family:system-ui;box-shadow:0 2px 8px rgba(0,0,0,.4)">${lp.label}</div>`;
  return L.divIcon({ html, iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-15], className:'' });
}

LAUNCH_POINTS.forEach(lp => {
  const m = L.marker([lp.lat, lp.lon], { icon:makeLPIcon(lp), pane:'markerPane', zIndexOffset:100 }).addTo(map);
  m.on('click', () => {
    m.bindPopup(`<div class="lpopup">
      <div class="lpopup-site">The Wrekin</div>
      <div class="lpopup-name">${lp.name}</div>
      <div class="lpopup-coord">${lp.lat.toFixed(5)}, ${lp.lon.toFixed(5)}</div>
      <div class="lpopup-status ${statusSc[lp.status]}">${statusText[lp.status]}</div>
    </div>`, {maxWidth:220}).openPopup();
    openPanel(); setTabActive('launch'); renderTab('launch');
  });
});

// ── Panel ──
const panel = document.getElementById('panel');
const grip  = document.getElementById('grip');
let panelOpen = false;
function openPanel()  { panel.classList.remove('closed'); panelOpen=true; }
function closePanel() { panel.classList.add('closed');    panelOpen=false; }
grip.addEventListener('click', () => panelOpen ? closePanel() : openPanel());

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => { setTabActive(btn.dataset.t); renderTab(btn.dataset.t); openPanel(); });
});
function setTabActive(t) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.t===t));
}

function renderTab(t) {
  const body = document.getElementById('pbody');
  if (t==='info')    body.innerHTML = renderInfo();
  if (t==='launch')  body.innerHTML = renderLaunch();
  if (t==='mypoints') body.innerHTML = renderMyPoints();
  if (t==='legend')  body.innerHTML = renderLegend();
  if (t==='rules')   body.innerHTML = renderRules();
}

function renderInfo() {
  return `<div class="section-title">Site Overview</div>
    <div style="font-size:13px;line-height:1.6;margin-bottom:.7rem">${SITE.notes}</div>
    <div class="lp-row"><span class="lp-lbl">Area</span><span class="lp-val">${SITE.area_ha} ha</span></div>
    <div class="lp-row"><span class="lp-lbl">Owner</span><span class="lp-val">${SITE.owner}</span></div>
    <div class="lp-row"><span class="lp-lbl">Designations</span><span class="lp-val">${SITE.designation}</span></div>
    <div class="lp-row"><span class="lp-lbl">Summit</span><span class="lp-val">407m ASL — ${SITE.summit.join(', ')}</span></div>
    <div class="section-title" style="margin-top:.9rem">Quick Links</div>
    <a href="https://magic.defra.gov.uk/MagicMap.aspx" target="_blank" style="font-size:12px;color:var(--accent)">Open MAGIC Map ↗</a><br>
    <a href="https://nats.aero/uas/operations/" target="_blank" style="font-size:12px;color:var(--accent)">NATS Drone Portal ↗</a>`;
}

function renderLaunch() {
  return LAUNCH_POINTS.map(lp => `
    <div class="lp-card" id="card-${lp.id}">
      <div class="lp-card-hdr" onclick="toggleCard('${lp.id}')">
        <span class="lp-badge">${lp.label}</span>
        <span class="lp-name">${lp.name}</span>
        <span class="lp-status ${statusSc[lp.status]}">${statusText[lp.status]}</span>
      </div>
      <div class="lp-body" id="body-${lp.id}">
        <div class="lp-row"><span class="lp-lbl">Coords</span><span class="lp-val" style="font-family:monospace">${lp.lat.toFixed(5)}, ${lp.lon.toFixed(5)}</span></div>
        <div class="lp-row"><span class="lp-lbl">Surface</span><span class="lp-val">${lp.surface}</span></div>
        <div class="lp-row"><span class="lp-lbl">Access</span><span class="lp-val">${lp.access}</span></div>
        <div class="lp-row"><span class="lp-lbl">Notes</span><span class="lp-val">${lp.notes}</span></div>
        ${lp.warn ? `<div class="lp-warn">⚠ ${lp.warn}</div>` : ''}
        <div class="lp-actions">
          <button class="btn-sm btn-fly" onclick="map.flyTo([${lp.lat},${lp.lon}],16)">Fly to</button>
          <a href="https://maps.google.com/?q=${lp.lat},${lp.lon}" target="_blank"><button class="btn-sm btn-gmap">Google Maps</button></a>
          <a href="${lp.magic}" target="_blank"><button class="btn-sm" style="background:#e8f0fe;color:#1a237e">MAGIC Map</button></a>
        </div>
      </div>
    </div>`).join('');
}
function toggleCard(id) {
  const b = document.getElementById('body-'+id);
  if (b) b.classList.toggle('open');
}

// ── My Points ──
const LS_KEY = 'wrekin_custom_points';
let customPoints = [];
let customMarkers = [];
let pendingLatLng = null;
try { customPoints = JSON.parse(localStorage.getItem(LS_KEY)||'[]'); } catch(e) { customPoints=[]; }
function saveCustomPoints() { try { localStorage.setItem(LS_KEY, JSON.stringify(customPoints)); } catch(e){} }

function makeCustomIcon(pt) {
  const c = statusColors[pt.status]||'#437a22';
  const html = `<div style="width:30px;height:30px;border-radius:50%;background:${c};border:2.5px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;color:#fff;font-family:system-ui;box-shadow:0 2px 8px rgba(0,0,0,.4)">${pt.label}</div>`;
  return L.divIcon({ html, iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-15], className:'custom-lp-icon' });
}
function renderCustomMarkers() {
  customMarkers.forEach(m => map.removeLayer(m));
  customMarkers = [];
  customPoints.forEach(pt => {
    const m = L.marker([pt.lat,pt.lon], { icon:makeCustomIcon(pt), pane:'markerPane', zIndexOffset:500 }).addTo(map);
    m.on('click', () => {
      m.bindPopup(`<div class="lpopup"><div class="lpopup-site" style="color:#6b3fa0">My Points</div><div class="lpopup-name">${pt.name}</div><div class="lpopup-coord">${pt.lat.toFixed(5)}, ${pt.lon.toFixed(5)}</div><div class="lpopup-status ${statusSc[pt.status]||'s-go'}">${statusText[pt.status]||'TOAL'}</div></div>`, {maxWidth:220}).openPopup();
      openPanel(); setTabActive('mypoints'); renderTab('mypoints');
    });
    customMarkers.push(m);
  });
}
renderCustomMarkers();

function renderMyPoints() {
  if (customPoints.length===0) return '<div style="font-size:13px;color:var(--muted);padding:.5rem 0">No custom points saved yet.<br>Tap + to add one.</div>';
  return `<div style="font-size:10.5px;color:var(--muted);margin-bottom:.5rem">Saved to this device · ${customPoints.length} point${customPoints.length!==1?'s':''}</div>`
    + customPoints.map(pt => `
    <div class="myp-card">
      <div class="myp-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="lp-badge" style="background:#6b3fa0">${pt.label}</span>
        <span class="myp-name">${pt.name}</span>
        <span class="lp-status ${statusSc[pt.status]||'s-go'}">${statusText[pt.status]||''}</span>
      </div>
      <div class="myp-body">
        <div class="lp-row"><span class="lp-lbl">Coords</span><span class="lp-val" style="font-family:monospace">${pt.lat.toFixed(5)}, ${pt.lon.toFixed(5)}</span></div>
        ${pt.notes?`<div class="lp-row"><span class="lp-lbl">Notes</span><span class="lp-val">${pt.notes}</span></div>`:''}
        ${pt.warn?`<div class="lp-warn">⚠ ${pt.warn}</div>`:''}
        <div class="lp-actions">
          <button class="btn-sm btn-fly" onclick="map.flyTo([${pt.lat},${pt.lon}],16)">Fly to</button>
          <a href="https://maps.google.com/?q=${pt.lat},${pt.lon}" target="_blank"><button class="btn-sm btn-gmap">Maps</button></a>
          <button class="btn-sm" style="background:#fee2e2;color:#991b1b" onclick="confirmDelete('${pt.id}')">Delete</button>
        </div>
        <div class="del-confirm" id="del-${pt.id}">
          <span style="flex:1;font-size:11.5px">Delete this point?</span>
          <button class="btn-del-confirm" onclick="doDelete('${pt.id}')">Yes</button>
          <button class="btn-del-cancel" onclick="document.getElementById('del-${pt.id}').classList.remove('show')">No</button>
        </div>
      </div>
    </div>`).join('');
}
function confirmDelete(id) { document.getElementById('del-'+id)?.classList.add('show'); }
function doDelete(id) {
  customPoints = customPoints.filter(p => p.id!==id);
  saveCustomPoints(); renderCustomMarkers(); renderTab('mypoints');
}

function renderLegend() {
  return `<div class="section-title">Map Layers</div>
    <div class="legend-row"><div class="legend-swatch sw-fe"></div><div class="legend-text"><strong>Forestry England</strong>Managed woodland — avoid low-level flying over canopy. No takeoff from within.</div></div>
    <div class="legend-row"><div class="legend-swatch sw-sssi"></div><div class="legend-text"><strong>SSSI Boundary</strong>The Wrekin & The Ercall SSSI (290ha). Flying permitted but wildlife disturbance is an offence. Avoid nesting season (Mar–Jul) near woodland.</div></div>
    <div class="legend-row"><div class="legend-swatch sw-toal" style="border-radius:50%;width:14px;height:14px;border:2px solid #437a22;background:rgba(67,122,34,.12)"></div><div class="legend-text"><strong>TOAL Zone</strong>Verified takeoff and landing area — outside managed land, public road or verge.</div></div>
    <div class="legend-row"><div class="legend-swatch sw-nt" style="border-radius:50%;width:14px;height:14px;background:#437a22"></div><div class="legend-text"><strong>LP Marker</strong>Green = TOAL ✓ &nbsp; Amber = Caution &nbsp; Red = No-Launch</div></div>`;
}

function renderRules() {
  return `
    <div class="rules-block"><strong>DJI Mini 5 Pro (249g) — Key Rules</strong>C0/C1 class rules apply. Open category A1. Can fly over people (not crowds). No restriction on SSSI land itself — but wildlife disturbance is an offence.</div>
    <div class="rules-block"><strong>Forestry England Land</strong>Forestry England do not operate a formal drone permit scheme. Avoid takeoff from within the forest block. Do not fly low over canopy. Public road verges outside the FE boundary are fine TOAL points.</div>
    <div class="rules-block"><strong>SSSI Rules</strong>No automatic ban on overflying. Disturbing protected wildlife (esp. nesting birds Mar–Jul) is an offence under the Wildlife & Countryside Act 1981. Consider seasonal restrictions.</div>
    <div class="rules-block"><strong>Wrekin Transmitter</strong>Active telecoms mast at summit. Check <a href="https://nats.aero" target="_blank">NATS</a> and NOTAM services before flying. Maintain 150m+ horizontal separation.</div>
    <div class="rules-block"><strong>Shropshire Hills AONB</strong>The Wrekin lies within the northern salient. No additional drone laws, but heightened public/ranger scrutiny. Fly responsibly.</div>`;
}

// ── Add point ──
let addMode = false;
function toggleAddMode() {
  addMode = !addMode;
  const btn = document.getElementById('btnAddPoint');
  const lbl = document.getElementById('addPointLabel');
  const mapEl = document.getElementById('map');
  if (addMode) {
    btn.classList.add('adding'); btn.textContent='✕'; lbl.classList.add('vis');
    mapEl.classList.add('map-adding'); closePanel();
  } else { cancelAddMode(); }
}
function cancelAddMode() {
  addMode = false;
  const btn=document.getElementById('btnAddPoint');
  btn.classList.remove('adding'); btn.textContent='+';
  document.getElementById('addPointLabel').classList.remove('vis');
  document.getElementById('map').classList.remove('map-adding');
}
map.on('click', function(e) {
  if (!addMode) return;
  if (document.getElementById('addSheet').classList.contains('open')) return;
  pendingLatLng = e.latlng;
  cancelAddMode();
  openAddSheet(pendingLatLng);
});
function openAddSheet(latlng) {
  document.getElementById('sheetCoords').textContent = latlng.lat.toFixed(5)+', '+latlng.lng.toFixed(5);
  document.getElementById('fName').value='';
  document.getElementById('fLabel').value='LP1';
  document.getElementById('fStatus').value='go';
  document.getElementById('fNotes').value='';
  document.getElementById('fWarn').value='';
  document.getElementById('fLat').value=latlng.lat;
  document.getElementById('fLon').value=latlng.lng;
  document.getElementById('addSheet').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),300);
}
function closeAddSheet() {
  document.getElementById('addSheet').classList.remove('open');
  pendingLatLng=null;
}
function savePoint() {
  const lat=parseFloat(document.getElementById('fLat').value);
  const lon=parseFloat(document.getElementById('fLon').value);
  if (isNaN(lat)||isNaN(lon)) { document.getElementById('sheetCoords').textContent='⚠ Location lost — close and try again.'; return; }
  const name=document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); document.getElementById('fName').style.borderColor='#a12c7b'; return; }
  document.getElementById('fName').style.borderColor='';
  const pt={
    id:'cust_'+Date.now(), name,
    label:document.getElementById('fLabel').value,
    status:document.getElementById('fStatus').value,
    notes:document.getElementById('fNotes').value.trim(),
    warn:document.getElementById('fWarn').value.trim(),
    lat, lon,
    saved:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
  };
  customPoints.unshift(pt);
  saveCustomPoints();
  closeAddSheet();
  renderCustomMarkers();
  openPanel(); setTabActive('mypoints'); renderTab('mypoints');
  setTimeout(()=>{ map.panTo([pt.lat,pt.lon]); },150);
}

// ── Fly to ──
function flyTo(lat,lon,z) { map.flyTo([lat,lon],z||14,{duration:1.2}); }

// ── Block Leaflet propagation on overlays ──
(function() {
  ['panel','layerToggle','siteBar'].forEach(id => {
    const el=document.getElementById(id);
    if (el) { L.DomEvent.disableClickPropagation(el); L.DomEvent.disableScrollPropagation(el); }
  });
  const sheet=document.getElementById('addSheet');
  if (sheet) {
    L.DomEvent.disableScrollPropagation(sheet);
    L.DomEvent.on(sheet,'mousedown touchstart',L.DomEvent.stopPropagation);
  }
})();

setTimeout(()=>{ openPanel(); renderTab('info'); },400);
setTimeout(()=>{ map.invalidateSize(); },500);
</script>
